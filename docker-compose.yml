services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    # No host port publishing. Reached internally by the client and, for /api/*,
    # by Dokploy's Traefik over "dokploy-network".
    environment:
      - NODE_ENV=production
      - PORT=4000
      - CORS_ORIGIN=https://ruudjuffermans.nl
      - RESEND_API_KEY=${RESEND_API_KEY:-re_placeholder}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-ruudjuffermans@pm.me}
      - NEWSLETTER_API_KEY=${NEWSLETTER_API_KEY:-placeholder}
      # Postgres is provisioned by the ruudjuffermans-infra stack (reachable as "db").
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/ruudjuffermans?schema=public
    # Apply migrations before the server boots.
    command: sh -c "npx prisma migrate deploy && node dist/index.js"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      # "backend" to reach the db; "dokploy-network" so Traefik can route /api/*.
      - backend
      - dokploy-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    # No host port publishing; Dokploy's Traefik fronts this on "dokploy-network".
    environment:
      # Empty -> the browser calls the API same-origin (/api/*), which Traefik
      # routes to the server. Note: NEXT_PUBLIC_* is baked at build time, so this
      # runtime value has no effect on the built client.
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_SITE_URL=https://ruudjuffermans.nl
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dokploy-network

networks:
  # Shared DB network created by the ruudjuffermans-infra stack; bring it up first.
  backend:
    external: true
  # Dokploy's proxy network; Traefik routes public traffic to services on it.
  dokploy-network:
    external: true

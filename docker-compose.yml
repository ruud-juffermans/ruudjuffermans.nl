services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - CORS_ORIGIN=http://localhost:3000
      - RESEND_API_KEY=${RESEND_API_KEY:-re_placeholder}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-ruudjuffermans@pm.me}
      - NEWSLETTER_API_KEY=${NEWSLETTER_API_KEY:-placeholder}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://server:4000
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

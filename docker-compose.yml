# ruudjuffermans.nl is now a CLIENT-ONLY deployment (the Next.js site). Its
# backend (contact form, newsletter, page-view analytics + their admin API)
# moved into the shared platform server (../ruudjuffermans-server →
# api.ruudjuffermans.nl) as the "website" module. The server/ directory in this
# repo is legacy and no longer deployed.
services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        # Baked into the client at build time; the browser calls the platform
        # API cross-origin (its CORS allowlists this site's origin).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.ruudjuffermans.nl}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://ruudjuffermans.nl}
    environment:
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://ruudjuffermans.nl}
    restart: unless-stopped
    networks:
      - dokploy-network

networks:
  # Dokploy's proxy network; Traefik routes ruudjuffermans.nl (and www) here.
  dokploy-network:
    external: true
